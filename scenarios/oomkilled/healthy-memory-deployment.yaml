apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthy-memory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: healthy-memory
  template:
    metadata:
      labels:
        app: healthy-memory
    spec:
      containers:
      - name: healthy-memory
        image: polinux/stress
        resources:
          limits:
            memory: "200Mi"
        command: ["stress"]
        args: ["--vm", "1", "--vm-bytes", "50M", "--vm-hang", "1"]
```
